<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interests | April Vissers</title>
    <link rel="stylesheet" href="../interests.css" />
  </head>
  <body>
    <header>
      <a class="brand" href="../#home">April Vissers</a>
      <nav>
        <a href="../#projects">Projects</a>
        <a href="../#resume">Resume</a>
        <a href="../#contact">Contact</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">Interests</p>
          <h1>Off hours.</h1>
          <p class="lead">Skiing. Biking. Camper projects. Field days.</p>
        </div>
        <div class="feature">
          <img src="../media/biking.jpeg" alt="April Vissers biking in the mountains" />
          <span>Biking</span>
        </div>
      </section>

      <section class="gallery" aria-label="Interests media gallery">
        <article class="media-card bike">
          <img src="../media/biking.jpeg" alt="April Vissers biking in the mountains" />
          <h2>Biking</h2>
        </article>
        <article class="media-card camper">
          <img src="../media/camper.jpg" alt="April Vissers working on camper solar panels" />
          <h2>Camper Living</h2>
        </article>
        <article class="media-card field">
          <img src="../media/aercoustics-site.jpg" alt="April Vissers on site with acoustics and vibration equipment" />
          <h2>Field Work</h2>
        </article>
        <article class="media-card ski">
          <video controls preload="metadata" src="../media/skiing.mp4"></video>
          <h2>Skiing</h2>
        </article>
      </section>
    </main>
  </body>
</html>
